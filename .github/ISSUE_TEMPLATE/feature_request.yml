name: Feature request
description: Propose an improvement to Clementine.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should Clementine solve?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the result and how a user would know it works.
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Data and permission boundaries
      description: Note any new external service, sensitive data, operating-system permission, or irreversible action this would involve.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or smaller approaches have you considered?
