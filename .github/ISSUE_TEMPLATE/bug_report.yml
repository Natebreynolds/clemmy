name: Bug report
description: Report a reproducible problem in Clementine.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Clementine. Do not include credentials, private logs, meeting content, or customer data. Use GitHub's private vulnerability reporting for security issues.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open …
        2. Configure …
        3. Observe …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Clementine version
      placeholder: "1.17.2"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS Apple Silicon
        - macOS Intel
        - Windows
        - Linux
        - Source checkout
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Sanitized diagnostics
      description: Include only the minimum relevant output after removing paths, identities, prompts, tokens, and private data.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Safety check
      options:
        - label: I removed credentials, personal data, meeting content, and customer information from this report.
          required: true
        - label: This is not a security vulnerability.
          required: true
