name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Run the node:test suite via tsx. The pattern matches every
      # *.test.ts file under src/. Currently 100+ tests across:
      #   - memory: embeddings, recall, facts
      #   - agents: autonomy-v2, run-tracking, autonomy-guardrails, check-ins
      # If you add a new test file, this picks it up automatically.
      - name: Run tests
        run: npx tsx --test src/**/*.test.ts

  gate-benchmark:
    name: Harness gate benchmark (violations prevented)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Gates ON vs OFF: every safety gate must still PREVENT its trap (a
      # scenario that WOULD commit an irreversible rule violation). Fully
      # offline/deterministic — no model, no network, no auth. Exits non-zero
      # if any gate stops blocking, so a gate regression fails the build.
      # BLOCKING by design (the eval IS the harness). Run locally: npm run bench:gates
      - name: Run gate benchmark
        run: npm run bench:gates

  typecheck:
    name: TypeScript check (non-blocking on WIP files)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Run tsc but allow failure for now — there are work-in-progress
      # type errors in background-tasks.ts and codex-native-runtime.ts
      # that pre-date the SDK-native autonomy work. This step surfaces
      # them in CI output without blocking merges. Flip
      # continue-on-error to false once those files settle.
      - name: Typecheck
        run: npx tsc --noEmit
