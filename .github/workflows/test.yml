name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  notch-helper-macos:
    name: Native notch helper (macOS)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Typecheck desktop notch integration
        working-directory: apps/desktop
        run: npm run typecheck

      - name: Build native notch helper
        working-directory: apps/desktop
        run: npm run build:notch-helper

      - name: Probe native notch helper
        working-directory: apps/desktop
        run: >-
          node -e 'const { execFileSync } = require("node:child_process");
          const helper = "./native/notch-click-helper/.build/ClementineNotchHelper";
          const probe = JSON.parse(execFileSync(helper, ["--probe"], { encoding: "utf8" }));
          if (probe.type !== "probe" || probe.protocol !== 1) throw new Error(`Unexpected helper probe: ${JSON.stringify(probe)}`);'

  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Check public repository hygiene
        run: npm run check:public-hygiene

      - name: Test public repository hygiene gate
        run: npm run test:public-hygiene

      - name: Install dependencies
        run: npm ci

      - name: Install console-web test dependencies
        working-directory: apps/console-web
        run: npm ci

      # The release-asset tests exercise apps/desktop/scripts/vendor-recall-native.mjs,
      # which imports 'tar' from apps/desktop's own dependencies — without this install
      # every main push/PR dies with ERR_MODULE_NOT_FOUND at 'Run release asset tests'
      # (mirrors the identical step in release-desktop.yml's preflight).
      - name: Install desktop test dependencies
        working-directory: apps/desktop
        run: npm ci

      # Run the node:test suite via tsx. The pattern matches every
      # *.test.ts file under src/ and apps/. Currently 100+ tests across:
      #   - memory: embeddings, recall, facts
      #   - agents: autonomy-v2, run-tracking, autonomy-guardrails, check-ins
      # If you add a new test file, this picks it up automatically.
      - name: Run tests
        run: npm test

      - name: Run release asset tests
        run: npm run test:release-assets

  gate-benchmark:
    name: Harness gate benchmark (violations prevented)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Gates ON vs OFF: every safety gate must still PREVENT its trap (a
      # scenario that WOULD commit an irreversible rule violation). Fully
      # offline/deterministic — no model, no network, no auth. Exits non-zero
      # if any gate stops blocking, so a gate regression fails the build.
      # BLOCKING by design (the eval IS the harness). Run locally: npm run bench:gates
      - name: Run gate benchmark
        run: npm run bench:gates

  eval-suites:
    name: Eval suites (pass^k consistency + job evals)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # pass^k over the gate-benchmark TRAPS + golden JOB-run replays. Both are
      # fully offline/deterministic (stub judges / fixture replay under a temp
      # CLEMENTINE_HOME — no model, no network, no auth). STRICT mode exits
      # non-zero when pass^k drops below threshold, so a regressed trap or job
      # fails the build. BLOCKING by design — the eval IS the harness; this turns
      # forward-only into a build gate. Run locally: EVAL_PASSK_STRICT=on npm run
      # eval:passk  /  EVAL_JOBS_STRICT=on npm run eval:jobs
      - name: pass^k consistency (strict)
        run: EVAL_PASSK_STRICT=on npm run eval:passk

      - name: Job evals (strict)
        run: EVAL_JOBS_STRICT=on npm run eval:jobs

  typecheck:
    name: TypeScript check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  web-apps:
    name: Web app builds
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            apps/mobile-web/package-lock.json
            apps/console-web/package-lock.json

      - name: Install mobile-web dependencies
        run: npm ci
        working-directory: apps/mobile-web

      - name: Install console-web dependencies
        run: npm ci
        working-directory: apps/console-web

      - name: Typecheck mobile-web
        run: npm run typecheck
        working-directory: apps/mobile-web

      - name: Build mobile-web
        run: npm run build
        working-directory: apps/mobile-web

      - name: Typecheck console-web
        run: npm run typecheck
        working-directory: apps/console-web

      - name: Build console-web
        run: npm run build
        working-directory: apps/console-web
