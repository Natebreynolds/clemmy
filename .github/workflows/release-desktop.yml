name: Release Desktop App

# Builds, signs, notarizes, and publishes the Clementine .dmg + zip
# to GitHub Releases whenever a tag matching `v*` is pushed.
#
# Required repository secrets:
#   APPLE_ID                  natebreynolds@icloud.com
#   APPLE_APP_PASSWORD        16-char app-specific password from appleid.apple.com
#   APPLE_TEAM_ID             4AR3Y8XD72
#   CSC_LINK                  base64-encoded Developer ID Application .p12
#   CSC_KEY_PASSWORD          password used when exporting the .p12
#   GITHUB_TOKEN              auto-provided by Actions; lets electron-builder
#                             upload the .dmg to the release.
#
# To export your cert as .p12 for CSC_LINK:
#   1. Open Keychain Access on the machine where the cert lives
#   2. Find "Developer ID Application: Nathan Reynolds (4AR3Y8XD72)"
#   3. Right-click → Export → format = "Personal Information Exchange (.p12)"
#   4. Set a strong export password — that's the CSC_KEY_PASSWORD value
#   5. base64 -i cert.p12 -o cert.p12.b64 → paste the contents as CSC_LINK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  release-mac:
    runs-on: macos-14   # arm64 runner so we can build native arm64 + cross-compile x64
    permissions:
      contents: write   # required to upload release assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install daemon deps + build
        run: |
          npm ci
          npm run build

      - name: Install desktop deps
        working-directory: apps/desktop
        run: npm ci

      - name: Install mobile-web deps
        # package:dist runs build:mobile-web (tsc + vite), which needs
        # apps/mobile-web's own deps (e.g. vite/client types). The other
        # install steps don't cover this nested workspace.
        working-directory: apps/mobile-web
        run: npm ci

      - name: Install console-web deps
        # The release build (release-mac-dual-arch.sh) runs build:console-web
        # (tsc + vite) for the new desktop UI, which needs this nested
        # workspace's own deps. Without this the bundle is never built and
        # the packaged app silently falls back to the legacy console.
        working-directory: apps/console-web
        run: npm ci

      - name: Verify release secrets
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=()
          for name in APPLE_ID APPLE_APP_PASSWORD APPLE_TEAM_ID CSC_LINK CSC_KEY_PASSWORD; do
            value="${!name-}"
            if [[ -z "$value" ]]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required desktop release secrets: ${missing[*]}"
            exit 1
          fi

      - name: Sync app version from the pushed tag
        working-directory: apps/desktop
        # electron-builder versions the app (and its latest-mac.yml update feed)
        # from apps/desktop/package.json. The release-bump commit only updates the
        # ROOT package.json, so the desktop app stayed frozen at whatever version
        # apps/desktop/package.json last held — every release since republished
        # that stale version and the auto-updater never advanced (users stuck on
        # an old build seeing "up to date"). Make the pushed tag authoritative so
        # the two can never desync again.
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Build + sign + notarize (no publish)
        working-directory: apps/desktop
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          # electron-builder >=25's built-in notarize step reads this
          # specific env var name (not APPLE_APP_PASSWORD). Same value;
          # both are exported so the custom afterSign hook AND the
          # built-in step both find what they need.
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # `release` uses --publish never so the afterAllArtifactBuild
        # hook can notarize + staple each .dmg *before* upload. With
        # --publish always (the previous setup), electron-builder
        # uploaded each artifact as it was built — i.e. before the
        # DMG-level staple landed — and the published DMGs went out
        # unstapled. On fresh Macs Gatekeeper rejects those as
        # "damaged" even though the .app inside is notarized.
        run: npm run release

      - name: Upload stapled artifacts to GitHub Release
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # The build step above leaves notarized + stapled DMGs, signed
        # ZIPs, blockmaps, and latest-mac.yml in apps/desktop/release/.
        # --clobber lets a re-run of the same tag replace existing
        # assets without manual cleanup.
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+){2}(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Desktop releases must run from a semver tag like v0.4.23, not '$tag'."
            exit 1
          fi
          echo "Uploading artifacts for tag $tag"
          ls -la release/
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --generate-notes
          fi
          gh release upload "$tag" \
            release/Clementine-*.dmg \
            release/Clementine-*.dmg.blockmap \
            release/Clementine-*-mac.zip \
            release/Clementine-*-mac.zip.blockmap \
            release/latest-mac.yml \
            --clobber
