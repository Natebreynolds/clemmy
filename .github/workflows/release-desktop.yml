name: Release Desktop App

# Tag pushes publish production releases. Manual runs build a signed, notarized
# macOS candidate and keep it private as a GitHub Actions artifact.
#
# Required repository secrets:
#   APPLE_ID
#   APPLE_APP_PASSWORD
#   APPLE_TEAM_ID
#   CSC_LINK
#   CSC_KEY_PASSWORD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      candidate_version:
        description: 'Prerelease SemVer newer than package.json, without v (for example, 1.4.5-rc.1)'
        required: true
        type: string

# Production runs are serialized and an in-progress release is never cancelled.
# Candidate runs have independent groups so they cannot block a tag release.
concurrency:
  group: desktop-release-${{ github.event_name == 'push' && 'production' || format('candidate-{0}', github.run_id) }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    name: Validate source and release gates
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release-metadata.outputs.version }}
      tag: ${{ steps.release-metadata.outputs.tag }}
      candidate: ${{ steps.release-metadata.outputs.candidate }}

    steps:
      - name: Checkout exact source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate candidate or production tag
        id: release-metadata
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          CANDIDATE_VERSION: ${{ inputs.candidate_version }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            VERSION="$CANDIDATE_VERSION" node <<'NODE'
          const version = process.env.VERSION ?? '';
          const core = '(?:0|[1-9]\\d*)\\.(?:0|[1-9]\\d*)\\.(?:0|[1-9]\\d*)';
          const identifier = '(?:0|[1-9]\\d*|\\d*[A-Za-z-][0-9A-Za-z-]*)';
          const prerelease = `${identifier}(?:\\.${identifier})*`;
          const build = '[0-9A-Za-z-]+(?:\\.[0-9A-Za-z-]+)*';
          const candidate = new RegExp(`^${core}-${prerelease}(?:\\+${build})?$`);
          if (!candidate.test(version)) {
            console.error(`::error::candidate_version must be a prerelease SemVer without v (for example, 1.4.5-rc.1), not '${version}'.`);
            process.exit(1);
          }
          NODE
            current_version="$(node -p "require('./package.json').version")"
            if ! node scripts/release-candidate-version.mjs validate "$CANDIDATE_VERSION" "$current_version"; then
              echo "::error::candidate_version must be newer than package.json ($current_version)."
              exit 1
            fi
            echo "version=$CANDIDATE_VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "candidate=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RELEASE_TAG="$RELEASE_TAG" node <<'NODE'
          const tag = process.env.RELEASE_TAG ?? '';
          const stableTag = /^v(?:0|[1-9]\d*)\.(?:0|[1-9]\d*)\.(?:0|[1-9]\d*)$/;
          if (!stableTag.test(tag)) {
            console.error(`::error::Production desktop releases require a stable SemVer tag like v1.4.4, not '${tag}'.`);
            process.exit(1);
          }
          NODE

          git fetch --no-tags origin '+refs/heads/main:refs/remotes/origin/main'
          tag_sha="$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}")"
          main_sha="$(git rev-parse 'refs/remotes/origin/main^{commit}')"
          if [[ "$tag_sha" != "$main_sha" ]]; then
            echo "::error::Tag $RELEASE_TAG resolves to $tag_sha, but origin/main is $main_sha. Production tags must point at the exact origin/main commit."
            exit 1
          fi

          echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "candidate=false" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install console-web test dependencies
        working-directory: apps/console-web
        run: npm ci

      # The release-asset tests exercise apps/desktop/scripts/vendor-recall-native.mjs,
      # which imports 'tar' from apps/desktop's own dependencies — without this install
      # the preflight dies with ERR_MODULE_NOT_FOUND before anything builds (caught by
      # the 2026-07-14 pre-release review; reproduced locally).
      - name: Install desktop test dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Release asset tests
        run: npm run test:release-assets

      - name: Typecheck
        run: npm run typecheck

      - name: Harness gate benchmark
        run: npm run bench:gates

      - name: Memory reliability gate
        run: npm run eval:memory

      - name: pass^k consistency (strict)
        run: npm run eval:passk
        env:
          EVAL_PASSK_STRICT: 'on'

      - name: Job evals (strict)
        run: npm run eval:jobs
        env:
          EVAL_JOBS_STRICT: 'on'

  release-mac:
    name: Build signed and notarized macOS artifacts
    needs: preflight
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install daemon dependencies and build
        run: |
          npm ci
          npm run build

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Install mobile-web dependencies
        working-directory: apps/mobile-web
        run: npm ci

      - name: Install console-web dependencies
        working-directory: apps/console-web
        run: npm ci

      - name: Verify release secrets
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=()
          for name in APPLE_ID APPLE_APP_PASSWORD APPLE_TEAM_ID CSC_LINK CSC_KEY_PASSWORD; do
            value="${!name-}"
            if [[ -z "$value" ]]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required desktop release secrets: ${missing[*]}"
            exit 1
          fi

      - name: Sync daemon version
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Sync app version
        working-directory: apps/desktop
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build, sign, and notarize
        working-directory: apps/desktop
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: npm run release

      - name: Verify macOS release assets and updater feed
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: node scripts/verify-desktop-release-assets.mjs --dir apps/desktop/release --version "$VERSION"

      - name: Upload private macOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: clementine-macos-${{ needs.preflight.outputs.version }}
          path: |
            apps/desktop/release/Clementine-*.dmg
            apps/desktop/release/Clementine-*.dmg.blockmap
            apps/desktop/release/Clementine-*-mac.zip
            apps/desktop/release/Clementine-*-mac.zip.blockmap
            apps/desktop/release/latest-mac.yml
          if-no-files-found: error
          retention-days: 14

  release-windows:
    name: Build Windows artifacts
    needs: preflight
    runs-on: windows-latest
    # Manual runs are macOS candidates. For a tag, [mac-only] on the tagged
    # commit intentionally skips Windows.
    if: ${{ github.event_name == 'push' && !contains(github.event.head_commit.message, '[mac-only]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install daemon dependencies
        run: npm ci

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Install mobile-web dependencies
        working-directory: apps/mobile-web
        run: npm ci

      - name: Install console-web dependencies
        working-directory: apps/console-web
        run: npm ci

      - name: Sync daemon version
        shell: bash
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Sync app version
        working-directory: apps/desktop
        shell: bash
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build Windows installer
        working-directory: apps/desktop
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
        run: npm run package:win

      - name: Verify Windows release assets and updater feed
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: node scripts/verify-desktop-release-assets.mjs --dir apps/desktop/release --version "$VERSION" --platform windows

      - name: Upload private Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: clementine-windows-${{ needs.preflight.outputs.version }}
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.exe.blockmap
            apps/desktop/release/latest.yml
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish production GitHub Release
    needs:
      - preflight
      - release-mac
      - release-windows
    runs-on: ubuntu-latest
    if: >-
      ${{
        always() &&
        github.event_name == 'push' &&
        needs.preflight.result == 'success' &&
        needs.release-mac.result == 'success' &&
        (needs.release-windows.result == 'success' || needs.release-windows.result == 'skipped')
      }}
    permissions:
      contents: write

    steps:
      - name: Checkout tags
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download macOS artifacts
        uses: actions/download-artifact@v8
        with:
          name: clementine-macos-${{ needs.preflight.outputs.version }}
          path: release-assets

      - name: Download Windows artifacts
        if: ${{ needs.release-windows.result == 'success' }}
        uses: actions/download-artifact@v8
        with:
          name: clementine-windows-${{ needs.preflight.outputs.version }}
          path: release-assets

      - name: Create draft, upload assets, and publish atomically
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          assets=(release-assets/*)
          if (( ${#assets[@]} == 0 )); then
            echo "::error::No production release assets were downloaded."
            exit 1
          fi

          # A release is "latest" when its tag is the highest stable SemVer among
          # PUBLISHED releases (including itself, about to publish). Comparing
          # against repository TAGS stranded the marker during a rapid release
          # train (2026-07-23): every build published while an even newer tag
          # already existed, so every one set latest=false and desktop updaters
          # (which resolve /releases/latest) never saw v2.5.1-v2.5.4. An older
          # workflow finishing later still cannot steal latest from a newer
          # published release; a newer TAG whose build was cancelled or is still
          # running no longer blocks the best available build from being latest.
          newest_stable_tag="$(node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const stable = /^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$/;
          const published = execFileSync('gh', [
            'release', 'list', '--limit', '100',
            '--json', 'tagName,isDraft,isPrerelease',
          ], { encoding: 'utf8' });
          const tags = JSON.parse(published)
            .filter((r) => !r.isDraft && !r.isPrerelease)
            .map((r) => r.tagName)
            .concat(process.env.RELEASE_TAG ?? [])
            .map((tag) => ({ tag, match: tag.match(stable) }))
            .filter(({ match }) => match)
            .sort((a, b) => {
              for (let index = 1; index <= 3; index += 1) {
                const difference = BigInt(a.match[index]) - BigInt(b.match[index]);
                if (difference < 0n) return -1;
                if (difference > 0n) return 1;
              }
              return 0;
            });
          process.stdout.write(tags.at(-1)?.tag ?? '');
          NODE
          )"

          mark_latest=false
          if [[ "$RELEASE_TAG" == "$newest_stable_tag" ]]; then
            mark_latest=true
          fi

          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --verify-tag \
              --draft \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi

          gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          gh release edit "$RELEASE_TAG" --draft=false --latest="$mark_latest"
